services:
  - type: web
    name: leads-tracker-api
    env: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: META_API_VERSION
        value: v19.0
      - key: INTERVALO_SYNC_HORAS
        value: "6"
      - key: BASE_URL
        value: https://leads-tracker-api.onrender.com
      - key: FIREBASE_CREDENTIALS_JSON
        sync: false
